services:
  mongo:
    container_name: ship-mongo
    image: mongo:8.0
    entrypoint:
      - bash
      - -c
      - |
        exec docker-entrypoint.sh $$@
    command: mongod --replSet rs --bind_ip_all --keyFile config/keyfile --quiet --logpath /dev/null
    environment:
      - MONGO_INITDB_ROOT_USERNAME=root
      - MONGO_INITDB_ROOT_PASSWORD=root
    networks:
      - ship
    ports:
      - 27017:27017
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - .dev/mongo/config/keyfile:/config/keyfile
      - type: volume
        source: mongodb
        target: /data/db
      - type: volume
        source: mongodb-cfg
        target: /data/configdb
  mongo-replicator:
    container_name: ship-mongo-replicator
    image: mongo:8.0
    entrypoint:
      - bash
      - -c
      - |
        cd /scripts
        chmod +x /setup.sh
        bash /setup.sh
    volumes:
      - ./bin/setup.sh:/setup.sh
      - ./bin:/scripts
    environment:
      - HOST=mongo
      - PORT=27017
      - USERNAME=root
      - PASSWORD=root
      - REPLICA_SET_NAME=rs
    networks:
      - ship
    depends_on:
      - mongo
  api:
    depends_on:
      - mongo-replicator
  migrator:
    depends_on:
      - mongo-replicator
  scheduler:
    depends_on:
      - mongo-replicator
networks:
  ship:
    name: ship-network
volumes:
  mongodb:
  mongodb-cfg:
