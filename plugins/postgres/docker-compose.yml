services:
  postgres:
    container_name: ship-postgres
    image: postgres:17
    environment:
      POSTGRES_USER: root
      POSTGRES_PASSWORD: root
      POSTGRES_DB: api-development
    networks:
      - ship
    ports:
      - 5432:5432
    volumes:
      - type: volume
        source: pgdata
        target: /var/lib/postgresql/data
  api:
    depends_on:
      - postgres
  migrator:
    depends_on:
      - postgres
  scheduler:
    depends_on:
      - postgres
networks:
  ship:
    name: ship-network
volumes:
  pgdata:
